name: Manual Deployment

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to deploy'
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Get latest tag if not provided
        id: get-tag
        run: |
          if [ -z "${{ inputs.tag }}" ]; then
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "main")
            echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          fi

      - name: Display selected tag
        run: |
          echo "Deploying tag: ${{ steps.get-tag.outputs.tag }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy
        run: |
          echo "Deploy step - tag: ${{ steps.get-tag.outputs.tag }}"
          # Add your deployment commands here
